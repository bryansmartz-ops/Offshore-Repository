[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# SPA fallback - but exclude files with extensions and API routes
# This catches /about, /settings etc and serves index.html
# But lets /manifest.json, /manifest.webmanifest, /sw.js, /icons.png, and /.netlify/functions/* through
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {path = ["!/*.*", "!/manifest.json", "!/manifest.webmanifest", "!/.netlify/*"]}

# Headers for manifest files
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
